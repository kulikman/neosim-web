<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Coverage — NeoSIM works in 150+ countries</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="parts/Shared.jsx"></script>
<script type="text/babel" src="parts/WorldMap.jsx"></script>
<script type="text/babel" src="parts/Nav.jsx"></script>
<script type="text/babel" src="parts/Footer.jsx"></script>
<script type="text/babel">
function CoveragePage() {
  const [region, setRegion] = React.useState('All');
  const [search, setSearch] = React.useState('');
  const [sort, setSort] = React.useState('az');
  const regions = ['All', 'Europe', 'Asia', 'Americas', 'Middle East', 'Africa', 'Oceania'];

  const list = React.useMemo(() => {
    let l = COUNTRIES.filter(c => region === 'All' || c.region === region);
    if (search) l = l.filter(c => c.name.toLowerCase().includes(search.toLowerCase()));
    if (sort === 'az') l = [...l].sort((a,b) => a.name.localeCompare(b.name));
    if (sort === 'price') l = [...l].sort((a,b) => a.price - b.price);
    return l;
  }, [region, search, sort]);

  return (
    <>
      <Nav currentPath="coverage" />
      <section style={{ padding: '140px 0 30px', position: 'relative' }}>
        <div className="dot-grid" style={{ position: 'absolute', inset: 0, opacity: 0.5 }} />
        <div className="aurora" style={{ opacity: 0.3 }} />
        <div className="container" style={{ position: 'relative' }}>
          <div style={{ maxWidth: 760, marginBottom: 32 }}>
            <div className="caption" style={{ color: '#66b7ff', marginBottom: 16 }}>Coverage</div>
            <h1 className="h-1" style={{ margin: 0, marginBottom: 16 }}>
              150+ countries.<br/><span className="gradient-text">One transparent rate per GB.</span>
            </h1>
            <p className="lead" style={{ maxWidth: 600 }}>
              Live native 4G/5G via 500+ tier-1 carriers. Tap any country for live rates and supported networks.
            </p>
          </div>
          <WorldMap countries={COUNTRIES} />
        </div>
      </section>
      <section style={{ padding: '30px 0 60px', position: 'relative' }}>
        <div className="container" style={{ position: 'relative' }}>

          {/* controls */}
          <div className="glass" style={{ padding: 16, marginBottom: 24, display: 'flex', gap: 12, alignItems: 'center', flexWrap: 'wrap' }}>
            <div className="field" style={{ flex: 1, minWidth: 220, padding: '12px 16px' }}>
              <I.Search size={18} />
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search 150+ countries…" />
            </div>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              {regions.map(r => (
                <button key={r} onClick={() => setRegion(r)} className="pill" style={{
                  padding: '8px 16px', fontSize: 13, cursor: 'pointer',
                  background: region === r ? '#fff' : 'rgba(255,255,255,0.04)',
                  color: region === r ? '#000a17' : '#fff',
                  borderColor: region === r ? '#fff' : 'rgba(255,255,255,0.08)',
                }}>{r}</button>
              ))}
            </div>
            <div className="seg">
              <button className={sort === 'az' ? 'active' : ''} onClick={() => setSort('az')} style={{ height: 38, padding: '0 14px', fontSize: 13 }}><span className="dot" /> A–Z</button>
              <button className={sort === 'price' ? 'active' : ''} onClick={() => setSort('price')} style={{ height: 38, padding: '0 14px', fontSize: 13 }}><span className="dot" /> Price</button>
            </div>
          </div>

          {/* table */}
          <div className="glass-strong" style={{ padding: 0, overflow: 'hidden' }}>
            <div style={{
              display: 'grid', gridTemplateColumns: '1.5fr 1fr 2fr 0.7fr 1fr 0.6fr',
              padding: '18px 28px', borderBottom: '1px solid var(--border)',
              background: 'rgba(255,255,255,0.02)', fontSize: 12,
              color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: '0.05em', fontWeight: 600
            }} className="cov-row">
              <div>Country</div><div>Region</div><div>Networks</div><div>Tech</div><div style={{ textAlign: 'right' }}>Per GB</div><div></div>
            </div>
            {list.map((c, i) => (
              <div key={c.code} style={{
                display: 'grid', gridTemplateColumns: '1.5fr 1fr 2fr 0.7fr 1fr 0.6fr',
                padding: '16px 28px', alignItems: 'center',
                borderBottom: i < list.length - 1 ? '1px solid var(--border)' : 'none',
                fontSize: 14
              }} className="cov-row">
                <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                  <span style={{ fontSize: 22 }}>{c.flag}</span>
                  <span style={{ fontWeight: 600 }}>{c.name}</span>
                </div>
                <div style={{ color: 'var(--text-3)', fontSize: 13 }}>{c.region}</div>
                <div style={{ color: 'var(--text-2)', fontSize: 13 }}>{c.networks}</div>
                <div>
                  <span style={{
                    fontSize: 11, fontWeight: 600, padding: '4px 8px', borderRadius: 999,
                    background: c.tech.includes('5G') ? 'rgba(0,127,255,0.15)' : 'rgba(255,255,255,0.04)',
                    color: c.tech.includes('5G') ? '#66b7ff' : 'var(--text-2)',
                    border: c.tech.includes('5G') ? '1px solid rgba(0,127,255,0.3)' : '1px solid var(--border)'
                  }}>{c.tech}</span>
                </div>
                <div className="mono" style={{ textAlign: 'right', color: '#fff', fontSize: 14 }}>${c.price.toFixed(3)}</div>
                <div style={{ textAlign: 'right' }}>
                  <button className="btn-icon" style={{ width: 36, height: 36 }}>
                    <I.ArrowUpRight size={14} />
                  </button>
                </div>
              </div>
            ))}
            {list.length === 0 && (
              <div style={{ padding: 60, textAlign: 'center', color: 'var(--text-3)' }}>
                No countries match — try a different search.
              </div>
            )}
          </div>

          <div style={{ marginTop: 24, fontSize: 13, color: 'var(--text-3)', textAlign: 'center' }}>
            Showing {list.length} countries · Coverage updates monthly
          </div>
        </div>
      </section>
      <Footer />
      <style>{`
        @media (max-width: 900px) {
          .cov-row { grid-template-columns: 1.6fr 1fr 0.8fr 0.6fr !important; }
          .cov-row > :nth-child(3), .cov-row > :nth-child(6) { display: none; }
        }
      `}</style>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<CoveragePage />);
</script>
</body>
</html>
