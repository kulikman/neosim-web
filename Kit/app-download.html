/* ── Phone Mockup ── */
function PhoneMock({ screen, scale = 1, rotate = 0, glowColor = 'rgba(0,127,255,0.5)' }) {
  return (
    <div style={{
      width: 240 * scale, height: 490 * scale, borderRadius: 44 * scale,
      background: 'linear-gradient(180deg, #0a1424, #02060f)',
      border: '2px solid rgba(255,255,255,0.08)',
      boxShadow: `0 30px 80px ${glowColor}, 0 0 0 1px rgba(255,255,255,0.04), inset 0 1px 0 rgba(255,255,255,0.08)`,
      padding: 7 * scale,
      transform: `rotate(${rotate}deg)`,
      flexShrink: 0,
      transition: 'box-shadow 0.6s ease',
      position: 'relative',
    }}>
      {/* top gradient highlight */}
      <div style={{ position: 'absolute', inset: 0, borderRadius: 44 * scale, padding: 1,
        background: 'linear-gradient(180deg, rgba(255,255,255,0.10), transparent 40%)',
        WebkitMask: 'linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0)',
        WebkitMaskComposite: 'xor', maskComposite: 'exclude', pointerEvents: 'none'
      }} />
      <div style={{ width: '100%', height: '100%', borderRadius: 38 * scale, overflow: 'hidden',
        background: 'linear-gradient(180deg, #050d20 0%, #0a1830 60%, #001033 100%)', position: 'relative' }}>
        {/* notch */}
        <div style={{ position: 'absolute', top: 7 * scale, left: '50%', transform: 'translateX(-50%)',
          width: 76 * scale, height: 18 * scale, borderRadius: 999, background: '#000', zIndex: 5 }} />
        {/* status */}
        <div style={{ display: 'flex', justifyContent: 'space-between', padding: `${12*scale}px ${18*scale}px 0`, fontSize: 10 * scale, fontWeight: 600 }}>
          <span>9:41</span>
          <div style={{ display: 'flex', gap: 3, alignItems: 'center' }}>
            <I.Signal size={9 * scale} /><I.Wifi size={9 * scale} /><I.Battery size={13 * scale} />
          </div>
        </div>
        <div style={{ height: `calc(100% - ${22*scale}px)`, fontSize: scale < 1 ? 11 : 13 }}>
          {screen}
        </div>
      </div>
    </div>
  );
}

                </div>
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 12, alignItems: 'stretch' }}>
                <a href="#" className="btn btn-primary" style={{ height: 56, fontSize: 15, paddingLeft: 20 }}>
                  <I.Apple size={18}/> Download on App Store
                </a>
                <a href="#" className="btn btn-ghost" style={{ height: 56, fontSize: 15, paddingLeft: 20 }}>
                  <I.Google size={18}/> Get it on Google Play
                </a>
                <div style={{ textAlign: 'center', paddingTop: 8 }}>
                  <div style={{ display: 'inline-block', background: '#fff', padding: 10, borderRadius: 12, marginBottom: 8 }}>
                    <div style={{ width: 80, height: 80, display: 'grid', gridTemplateColumns: 'repeat(8,1fr)', gap: 1 }}>
                      {Array.from({length: 64}).map((_,i) => {
                        const r = Math.floor(i/8), c = i%8;
                        const a = (r<3&&c<3)||(r<3&&c>4)||(r>4&&c<3);
                        return <span key={i} style={{ background: a ? '#000' : (Math.random()>0.5?'#000':'#fff') }} />;
                      })}
                    </div>
                  </div>
                  <div style={{ fontSize: 11, color: 'var(--text-3)' }}>Scan to download</div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <style>{`@media (max-width: 900px) { .cta-dl-grid { grid-template-columns: 1fr !important; } }`}</style>
      </section>

      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppDownloadPage />);
</script>
</body>
</html>
