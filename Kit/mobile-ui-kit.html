// ─── Lucide icon helper ────────────────────────────────────────────────────
// Lucide UMD exposes each icon as an array of [tagName, attrs] tuples.
// e.g. lucide.Globe = [["circle",{cx:"12",cy:"12",r:"10"}],["path",{d:"..."}]]
function Icon({ name, size = 16 }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el || !window.lucide) return;
    const iconData = window.lucide[name];
    if (!iconData) return;
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('width', size);
    svg.setAttribute('height', size);
    svg.setAttribute('viewBox', '0 0 24 24');
    svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke', 'currentColor');
    svg.setAttribute('stroke-width', '1.8');
    svg.setAttribute('stroke-linecap', 'round');
    svg.setAttribute('stroke-linejoin', 'round');
    svg.style.display = 'block';
    iconData.forEach(([tag, attrs]) => {
      const child = document.createElementNS(ns, tag);
      Object.entries(attrs || {}).forEach(([k, v]) => child.setAttribute(k, v));
      svg.appendChild(child);
    });
    el.innerHTML = '';
    el.appendChild(svg);
  });
  return <span ref={ref} style={{ display:'inline-flex', alignItems:'center', justifyContent:'center', flexShrink:0, width:size, height:size }} />;
}

// ─── Design tokens ──────────────────────────────────────────────────────────
const T = {
  bg0:'#000a17', bg1:'#050f20', bg2:'#0a1424', bg3:'#0f1c33', bg4:'#142240',
  blue:'#007fff', blueL:'#1a90ff', blueSoft:'rgba(0,127,255,0.12)', blueGlow:'rgba(0,127,255,0.35)',
  mint:'#3ee0a2', amber:'#f59e0b', red:'#ef4444',
  t1:'#ffffff', t2:'rgba(255,255,255,0.72)', t3:'rgba(255,255,255,0.50)', t4:'rgba(255,255,255,0.32)',
  b1:'rgba(255,255,255,0.08)', b2:'rgba(255,255,255,0.14)',
};

// ─── Layout helpers ─────────────────────────────────────────────────────────
const Row = ({ children, gap=8, align='center', wrap=false, style={} }) =>
  <div style={{ display:'flex', alignItems:align, gap, flexWrap:wrap?'wrap':'nowrap', ...style }}>{children}</div>;
const Col = ({ children, gap=8, style={} }) =>
  <div style={{ display:'flex', flexDirection:'column', gap, ...style }}>{children}</div>;

function KitLabel({ children }) {
  return <div style={{ fontSize:10, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', color:T.t3, marginBottom:10 }}>{children}</div>;
}
function Divider({ children }) {
  return (
    <div style={{ display:'flex', alignItems:'center', gap:10, margin:'8px 0' }}>
      <div style={{ flex:1, height:1, background:T.b1 }} />
      <span style={{ fontSize:10, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', color:T.t4 }}>{children}</span>
      <div style={{ flex:1, height:1, background:T.b1 }} />
    </div>
  );
}
function Card({ children, style={} }) {
  return <div style={{ padding:24, borderRadius:20, background:T.bg1, fontFamily:'Manrope,sans-serif', ...style }}>{children}</div>;
}

    { val:'rgba(255,255,255,0.72)', label:'text-2', note:'Body' },

  return (

            <div style={{ fontSize:10, fontWeight:700, color:T.t1, fontFamily:'JetBrains Mono,monospace' }}>{s.hex}</div>
            <div style={{ fontSize:10, color:T.t3 }}>{s.note}</div>
          </Col>
        ))}
      </Row>
      <Divider>Text tokens</Divider>
      <Col gap={8}>
        {text.map(t => (
          <Row key={t.label} gap={12}>
            <div style={{ width:32, height:32, borderRadius:8, background:T.bg3, border:`1px solid ${T.b1}`, display:'flex', alignItems:'center', justifyContent:'center' }}>
              <div style={{ width:16, height:16, borderRadius:4, background:t.val }} />
            </div>
            <Col gap={1}>

              <div style={{ fontSize:10, color:T.t3 }}>{t.note}</div>

            <div style={{ fontSize:10, color:T.t3 }}>{n}</div>

}

// ─── 3. BUTTONS ─────────────────────────────────────────────────────────────
function ButtonsKit() {
  const [active, setActive] = React.useState(null);
  const Btn = ({ label, id, style={} }) => (
    <button onMouseDown={()=>setActive(id)} onMouseUp={()=>setActive(null)} onMouseLeave={()=>setActive(null)}

      {label}
    </button>
  );
  return (
    <Col gap={16}>
      <KitLabel>Buttons</KitLabel>
      <Divider>Primary — 52px</Divider>
      <Row gap={8} wrap>
        <Btn label="Get free eSIM →" id="p1" style={{ background:'#fff', color:T.bg0 }} />
        <Btn label="Top up balance" id="p2" style={{ background:T.blue, color:'#fff', boxShadow:'0 8px 24px rgba(0,127,255,0.35)' }} />
        <Btn label="View plans" id="p3" style={{ background:T.bg2, border:`1px solid ${T.b1}`, color:T.t1 }} />
        <Btn label="Cancel plan" id="p4" style={{ background:'rgba(239,68,68,0.1)', border:'1px solid rgba(239,68,68,0.3)', color:T.red }} />
      </Row>
      <Divider>Medium — 44px</Divider>
      <Row gap={8} wrap>
        {[['Activate','m1',{background:'#fff',color:T.bg0}],['Top up','m2',{background:T.blue,color:'#fff'}],['Details','m3',{background:T.bg2,border:`1px solid ${T.b1}`,color:T.t1}]].map(([l,id,s])=>(
          <button key={id} onMouseDown={()=>setActive(id)} onMouseUp={()=>setActive(null)} onMouseLeave={()=>setActive(null)}
            style={{ height:44, padding:'0 20px', borderRadius:9999, fontFamily:'Manrope,sans-serif', fontWeight:700, fontSize:14, border:'none', cursor:'pointer', transition:'all 0.18s', transform:active===id?'scale(0.97)':'none', ...s }}>{l}</button>
        ))}
      </Row>
      <Divider>Small — 36px</Divider>
      <Row gap={8} wrap>
        {[['Add plan','s1',{background:'#fff',color:T.bg0}],['Buy data','s2',{background:T.blue,color:'#fff'}],['Share','s3',{background:T.bg2,border:`1px solid ${T.b1}`,color:T.t1}],['Cancel','s4',{background:'rgba(255,255,255,0.04)',border:`1px solid ${T.b1}`,color:T.t3}]].map(([l,id,s])=>(
          <button key={id} onMouseDown={()=>setActive(id)} onMouseUp={()=>setActive(null)} onMouseLeave={()=>setActive(null)}
            style={{ height:36, padding:'0 16px', borderRadius:9999, fontFamily:'Manrope,sans-serif', fontWeight:700, fontSize:13, border:'none', cursor:'pointer', transition:'all 0.18s', transform:active===id?'scale(0.97)':'none', ...s }}>{l}</button>
        ))}
      </Row>
      <Divider>Icon buttons — 52px</Divider>
      <Row gap={8}>
        {[['Plus','#fff',T.bg0,null],['Zap',T.blue,'#fff','0 8px 24px rgba(0,127,255,0.35)'],['Share2',T.bg2,T.t1,null],['Settings',T.bg2,T.t1,null],['X',T.bg2,T.t1,null]].map(([icon,bg,color,shadow],i)=>(
          <button key={icon+i} onMouseDown={()=>setActive('ic'+i)} onMouseUp={()=>setActive(null)} onMouseLeave={()=>setActive(null)}
            style={{ width:52,height:52,borderRadius:9999,background:bg,color,border:`1px solid ${T.b1}`,display:'inline-flex',alignItems:'center',justifyContent:'center',cursor:'pointer',transition:'all 0.18s',transform:active===('ic'+i)?'scale(0.93)':'none',boxShadow:shadow||'none',flexShrink:0 }}>
            <Icon name={icon} size={20} />
          </button>
        ))}
      </Row>
      <Divider>States</Divider>
      <Row gap={8} wrap>
        <button style={{ height:52,padding:'0 24px',borderRadius:9999,background:'#fff',color:T.bg0,fontFamily:'Manrope,sans-serif',fontWeight:700,fontSize:15,border:'none',opacity:0.4,cursor:'not-allowed' }}>Disabled</button>
        <button style={{ height:52,padding:'0 24px',borderRadius:9999,background:T.blue,color:'#fff',fontFamily:'Manrope,sans-serif',fontWeight:700,fontSize:15,border:'none',boxShadow:`0 0 0 3px rgba(0,127,255,0.35)`,cursor:'default' }}>Focused</button>
        <button style={{ height:52,padding:'0 24px',borderRadius:9999,background:T.blue,color:'#fff',fontFamily:'Manrope,sans-serif',fontWeight:700,fontSize:15,border:'none',opacity:0.65,cursor:'wait',display:'inline-flex',alignItems:'center',gap:8 }}>

// ─── 4. FORM INPUTS ─────────────────────────────────────────────────────────
function InputsKit() {
  const [v1,setV1]=React.useState('');
  const [v2,setV2]=React.useState('user@email.com');
  const [tog1,setTog1]=React.useState(true);
  const [tog2,setTog2]=React.useState(false);
  const [chk1,setChk1]=React.useState(true);
  const [chk2,setChk2]=React.useState(false);
  const [seg,setSeg]=React.useState('3 GB');
  const [focused,setFocused]=React.useState(null);

  const Field = ({ icon, placeholder, value, onChange, id, type='text', err=false }) => (
    <div style={{ display:'flex', alignItems:'center', gap:12, padding:'0 18px', height:54, borderRadius:16, background:err?'rgba(239,68,68,0.05)':'rgba(255,255,255,0.03)', border:`1px solid ${err?'rgba(239,68,68,0.35)':focused===id?'rgba(0,127,255,0.5)':T.b1}`, transition:'border-color 0.2s', boxShadow:focused===id&&!err?'0 0 0 3px rgba(0,127,255,0.1)':'none' }}>
      <span style={{ color:err?T.red:T.t3, display:'flex' }}><Icon name={icon} size={18} /></span>
      <input type={type} placeholder={placeholder} value={value} onChange={e=>onChange?.(e.target.value)} onFocus={()=>setFocused(id)} onBlur={()=>setFocused(null)}
        style={{ background:'none', border:'none', outline:'none', color:err?T.red:'#fff', fontFamily:'Manrope,sans-serif', fontSize:15, flex:1 }} />
    </div>
  );

  const Toggle = ({ on, setOn }) => (
    <div onClick={()=>setOn(!on)} style={{ width:46, height:26, borderRadius:13, background:on?T.blue:T.bg3, cursor:'pointer', position:'relative', transition:'background 0.2s', flexShrink:0, border:`1px solid ${on?'transparent':T.b1}` }}>
      <div style={{ position:'absolute', top:3, left:on?22:3, width:20, height:20, borderRadius:10, background:'#fff', transition:'left 0.2s', boxShadow:'0 2px 5px rgba(0,0,0,0.3)' }} />
    </div>
  );

  const Checkbox = ({ on, setOn }) => (
    <div onClick={()=>setOn(!on)} style={{ width:22, height:22, borderRadius:6, border:`1.5px solid ${on?T.blue:T.b2}`, background:on?T.blue:'transparent', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.15s', flexShrink:0 }}>
      {on && <svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4.5L4.5 8L11 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
    </div>
  );

  return (
    <Col gap={16}>
      <KitLabel>Form inputs</KitLabel>
      <Divider>Text fields</Divider>
      <Col gap={8}>
        <Field icon="Search" placeholder="Search countries, plans…" value={v1} onChange={setV1} id="f1" />
        <Field icon="Mail" placeholder="Email address" value={v2} onChange={setV2} id="f2" type="email" />
        <Field icon="Lock" placeholder="Password" value="" id="f3" type="password" />
        <Field icon="AlertCircle" placeholder="Invalid phone number" value="" id="f4" err />
      </Col>
      <Divider>Toggles</Divider>
      <Col gap={8}>
        {[['Auto-renew plan','Renew when data runs out',tog1,setTog1],['WiFi calling','Enable over WiFi',tog2,setTog2]].map(([label,sub,on,setOn])=>(
          <Row key={label} style={{ padding:'12px 16px', borderRadius:14, background:T.bg2, border:`1px solid ${T.b1}` }}>
            <Col gap={2} style={{ flex:1 }}>
              <div style={{ fontSize:14, fontWeight:600, color:T.t1 }}>{label}</div>
              <div style={{ fontSize:12, color:T.t3 }}>{sub}</div>
            </Col>
            <Toggle on={on} setOn={setOn} />
          </Row>
        ))}
      </Col>
      <Divider>Checkboxes</Divider>
      <Col gap={10}>
        {[['Save payment method',chk1,setChk1],['Subscribe to trip alerts',chk2,setChk2]].map(([label,on,setOn])=>(
          <Row key={label} gap={12} style={{ cursor:'pointer' }} onClick={()=>setOn(!on)}>
            <Checkbox on={on} setOn={setOn} />
            <span style={{ fontSize:14, fontWeight:500, color:on?T.t1:T.t2 }}>{label}</span>
          </Row>
        ))}
      </Col>
      <Divider>Segmented control</Divider>
      <div style={{ display:'inline-flex', padding:4, borderRadius:9999, background:T.bg2, border:`1px solid ${T.b1}`, gap:2 }}>
        {['1 GB','3 GB','5 GB','10 GB'].map(opt=>(
          <button key={opt} onClick={()=>setSeg(opt)} style={{ height:38, padding:'0 14px', borderRadius:9999, fontFamily:'Manrope,sans-serif', fontSize:13, fontWeight:700, border:'none', cursor:'pointer', transition:'all 0.2s', background:seg===opt?'#fff':'transparent', color:seg===opt?T.bg0:T.t3 }}>{opt}</button>
        ))}
      </div>
    </Col>
  );
}

// ─── 6. CARDS ───────────────────────────────────────────────────────────────
function CardsKit() {
  return (
    <Col gap={16}>
      <KitLabel>Cards</KitLabel>
      <Divider>eSIM plan cards</Divider>
      <Row gap={10}>
        {[
          { flag:'🇯🇵', country:'Japan', plan:'3 GB · 15 days', price:'$12.00', status:'Active', sc:T.mint, sb:'rgba(62,224,162,0.12)', exp:'Jun 12, 2026', pct:68 },

// Reset saved viewport position so canvas always starts at a sane location
try {
  const vpKey = 'dc-viewport:' + location.pathname;
  const saved = JSON.parse(localStorage.getItem(vpKey) || 'null');
  // If saved position is far offscreen (y > viewport height * 2), reset it
  if (saved && (Math.abs(saved.y) > window.innerHeight * 2 || Math.abs(saved.x) > window.innerWidth * 2)) {
    localStorage.removeItem(vpKey);
  }
} catch(e) {}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
