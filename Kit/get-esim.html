<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Get your free eSIM — NeoSIM</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="parts/Shared.jsx"></script>
<script type="text/babel" src="parts/Nav.jsx"></script>
<script type="text/babel" src="parts/Footer.jsx"></script>
<script type="text/babel">
function GetEsimPage() {
  const [step, setStep] = React.useState(1);
  const [type, setType] = React.useState('digital');
  const [email, setEmail] = React.useState('');
  const [name, setName] = React.useState('');
  const [device, setDevice] = React.useState({ ok: true, name: 'iPhone 15 Pro' });

  return (
    <>
      <Nav currentPath="get-esim" />
      <section style={{ padding: '140px 0 80px', minHeight: '100vh', position: 'relative' }}>
        <div className="dot-grid" style={{ position: 'absolute', inset: 0, opacity: 0.5 }} />
        <div className="aurora" style={{ opacity: 0.4 }} />
        <div className="container" style={{ position: 'relative', maxWidth: 720 }}>
          <a href="index.html" style={{ display: 'inline-flex', alignItems: 'center', gap: 8, color: 'var(--text-3)', fontSize: 13, marginBottom: 32 }}>
            <I.ArrowLeft size={14} /> Back to home
          </a>
          <div className="caption" style={{ color: '#66b7ff', marginBottom: 16 }}>Step {step} of 3</div>
          <h1 className="h-1" style={{ margin: 0, marginBottom: 16 }}>Get your <span className="gradient-text">free eSIM</span></h1>
          <p className="lead" style={{ marginBottom: 40, maxWidth: 540 }}>
            $0 to order. $0 monthly. You only pay for the gigabytes you actually use — plus a $2.50 welcome bonus.
          </p>

          <div className="glass-strong" style={{ padding: 36 }}>
            {/* type toggle */}
            <div className="caption" style={{ marginBottom: 12 }}>1 · Choose delivery</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 28 }}>
              {[
                { id: 'digital', icon: <I.QrCode size={20} />, t: 'Digital eSIM', s: 'Instant · email QR code', tag: 'Recommended' },
                { id: 'physical', icon: <I.Smartphone size={20} />, t: 'Physical SIM', s: 'Mailed in 3–5 days · $4.99', tag: null },
              ].map(o => (
                <button key={o.id} onClick={() => setType(o.id)} style={{
                  textAlign: 'left', padding: 20, borderRadius: 18,
                  background: type === o.id ? 'rgba(0,127,255,0.1)' : 'rgba(255,255,255,0.02)',
                  border: type === o.id ? '1px solid rgba(0,127,255,0.4)' : '1px solid var(--border)',
                  color: '#fff', cursor: 'pointer', position: 'relative'
                }}>
                  {o.tag && <span style={{ position: 'absolute', top: 14, right: 14, fontSize: 10, fontWeight: 700, padding: '4px 8px', borderRadius: 999, background: 'var(--mint)', color: '#000a17' }}>{o.tag}</span>}
                  <span className="icon-chip" style={{ width: 40, height: 40, borderRadius: 12, marginBottom: 14 }}>{o.icon}</span>
                  <div style={{ fontWeight: 700, fontSize: 16 }}>{o.t}</div>
                  <div style={{ fontSize: 13, color: 'var(--text-2)', marginTop: 4 }}>{o.s}</div>
                </button>
              ))}
            </div>

            {/* device check */}
            {type === 'digital' && (
              <div style={{
                padding: 16, borderRadius: 14, marginBottom: 28,
                background: device.ok ? 'rgba(62,224,162,0.08)' : 'rgba(239,68,68,0.08)',
                border: device.ok ? '1px solid rgba(62,224,162,0.3)' : '1px solid rgba(239,68,68,0.3)',
                display: 'flex', alignItems: 'center', gap: 12
              }}>
                <span style={{ width: 36, height: 36, borderRadius: 10, background: 'rgba(62,224,162,0.15)', color: 'var(--mint)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
                  <I.Check size={18} strokeWidth={2.5} />
                </span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 600, fontSize: 14 }}>Your {device.name} supports eSIM</div>
                  <div style={{ fontSize: 12, color: 'var(--text-3)' }}>Detected automatically · <a href="#" style={{ color: 'var(--mint)' }}>Wrong device?</a></div>
                </div>
              </div>
            )}

            {/* form */}
            <div className="caption" style={{ marginBottom: 12 }}>2 · Where to send it</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginBottom: 28 }}>
              <div className="field"><I.Smartphone size={18} /><input value={name} onChange={e => setName(e.target.value)} placeholder="Your full name" /></div>
              <div className="field">@<input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="your@email.com" /></div>
            </div>

            <div style={{ fontSize: 12, color: 'var(--text-3)', marginBottom: 20 }}>
              By continuing you agree to our <a href="terms.html" style={{ color: 'var(--accent-light)' }}>Terms</a> and <a href="privacy.html" style={{ color: 'var(--accent-light)' }}>Privacy Policy</a>.
            </div>

            <a href="get-esim-success.html" className="btn btn-primary" style={{ width: '100%', height: 60, fontSize: 16 }}>
              Send me my free eSIM <I.ArrowRight size={18} />
            </a>

            <div style={{ marginTop: 24, paddingTop: 24, borderTop: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', fontSize: 12, color: 'var(--text-3)' }}>
              <span>🔒 Encrypted · GDPR compliant</span>
              <span>Free delivery · No card required</span>
            </div>
          </div>
        </div>
      </section>
      <Footer />
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<GetEsimPage />);
</script>
</body>
</html>
