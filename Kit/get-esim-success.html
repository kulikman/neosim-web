<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Your eSIM is ready — NeoSIM</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="parts/Shared.jsx"></script>
<script type="text/babel" src="parts/Nav.jsx"></script>
<script type="text/babel" src="parts/Footer.jsx"></script>
<script type="text/babel">
function SuccessPage() {
  const [status, setStatus] = React.useState('activating');
  const [tab, setTab] = React.useState('install');
  React.useEffect(() => {
    const t = setTimeout(() => setStatus('ready'), 2400);
    return () => clearTimeout(t);
  }, []);

  // simple QR pattern (decorative)
  const qrCells = React.useMemo(() => {
    const cells = [];
    for (let i = 0; i < 21*21; i++) cells.push(Math.random() > 0.5);
    // anchor squares
    return cells;
  }, []);

  return (
    <>
      <Nav currentPath="get-esim" />
      <section style={{ padding: '140px 0 80px', minHeight: '100vh', position: 'relative' }}>
        <div className="dot-grid" style={{ position: 'absolute', inset: 0, opacity: 0.5 }} />
        <div className="aurora" style={{ opacity: 0.4 }} />
        <div className="container" style={{ position: 'relative', maxWidth: 880 }}>
          {/* status banner */}
          <div className="glass" style={{ padding: '20px 28px', display: 'flex', alignItems: 'center', gap: 16, marginBottom: 32 }}>
            <span style={{
              width: 44, height: 44, borderRadius: 12,
              background: status === 'ready' ? 'rgba(62,224,162,0.15)' : 'rgba(0,127,255,0.15)',
              color: status === 'ready' ? 'var(--mint)' : '#66b7ff',
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center'
            }}>
              {status === 'ready' ? <I.Check size={22} strokeWidth={2.5} /> : (
                <span style={{ width: 14, height: 14, border: '2px solid currentColor', borderTopColor: 'transparent', borderRadius: 999, animation: 'spin 0.9s linear infinite' }} />
              )}
            </span>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 700, fontSize: 16 }}>
                {status === 'ready' ? 'Your eSIM is ready to install' : 'Activating your eSIM…'}
              </div>
              <div style={{ fontSize: 13, color: 'var(--text-3)', marginTop: 2 }}>
                Order #NEO-2026-04-A8F2D · Sent to your email
              </div>
            </div>
            <span className="mono" style={{ color: status === 'ready' ? 'var(--mint)' : '#66b7ff' }}>
              {status === 'ready' ? 'READY' : 'POLLING'}
            </span>
          </div>

          <h1 className="h-1" style={{ margin: 0, marginBottom: 12 }}>
            Welcome aboard. <span className="gradient-text">Let's connect.</span>
          </h1>
          <p className="lead" style={{ marginBottom: 40, maxWidth: 600 }}>
            Pick your install method — easiest is the one-tap button on the device that received the email.
          </p>

          {/* tabs */}
          <div className="seg" style={{ marginBottom: 24 }}>
            {[
              { id: 'install', t: 'One-tap install', d: 'iOS 17.4+ · Recommended' },
              { id: 'qr', t: 'QR code', d: 'Scan from another device' },
              { id: 'manual', t: 'Manual setup', d: 'SM-DP+ address' },
            ].map(o => (
              <button key={o.id} onClick={() => setTab(o.id)} className={tab === o.id ? 'active' : ''}>
                <span className="dot" /> {o.t}
              </button>
            ))}
          </div>

          <div className="glass-strong" style={{ padding: 36, minHeight: 420 }}>
            {tab === 'install' && (
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 40, alignItems: 'center' }} className="install-grid">
                <div>
                  <div className="caption" style={{ color: '#66b7ff', marginBottom: 12 }}>Method 1 · Easiest</div>
                  <h2 className="h-3" style={{ margin: 0, marginBottom: 16 }}>Install with one tap</h2>
                  <p className="body-sm" style={{ marginBottom: 24 }}>
                    Tap the button below on the same iPhone you want NeoSIM on. iOS will open Settings and walk you through.
                  </p>
                  <ol style={{ paddingLeft: 18, fontSize: 14, color: 'var(--text-2)', lineHeight: 1.7, marginBottom: 28 }}>
                    <li>Tap "Install eSIM"</li>
                    <li>Confirm in Settings</li>
                    <li>Label the line "NeoSIM"</li>
                    <li>Done — keep both lines on</li>
                  </ol>
                  <button disabled={status !== 'ready'} className="btn btn-primary" style={{ width: '100%', height: 60, fontSize: 16, opacity: status !== 'ready' ? 0.5 : 1 }}>
                    {status === 'ready' ? <>Install eSIM <I.ArrowUpRight size={18} /></> : 'Activating…'}
                  </button>
                </div>
                <div style={{
                  position: 'relative', aspectRatio: '1/1.4', borderRadius: 28,
                  background: 'linear-gradient(180deg, rgba(0,127,255,0.15), rgba(0,127,255,0.02))',
                  border: '1px solid var(--border)', overflow: 'hidden',
                  display: 'flex', alignItems: 'center', justifyContent: 'center'
                }}>
                  <div style={{
                    width: 200, height: 360, borderRadius: 38,
                    background: '#000a17', border: '8px solid #1a2942', position: 'relative',
                    boxShadow: '0 30px 60px rgba(0,0,0,0.5), 0 0 80px rgba(0,127,255,0.25)'
                  }}>
                    <div style={{ padding: '28px 16px', textAlign: 'center' }}>
                      <div className="mono" style={{ fontSize: 9, marginBottom: 16 }}>iOS · Settings</div>
                      <div style={{ width: 64, height: 64, borderRadius: 16, background: 'linear-gradient(135deg,#007FFF,#1a90ff)', margin: '0 auto 12px', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 0 30px rgba(0,127,255,0.5)' }}>
                        <I.Globe size={28} strokeWidth={2.4} />
                      </div>
                      <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 4 }}>NeoSIM</div>
                      <div style={{ fontSize: 9, color: 'var(--text-3)', marginBottom: 18 }}>Add eSIM to iPhone</div>
                      <div style={{ background: '#fff', color: '#000a17', padding: '8px 0', borderRadius: 8, fontSize: 11, fontWeight: 700 }}>
                        Continue
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {tab === 'qr' && (
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 40, alignItems: 'center' }} className="install-grid">
                <div>
                  <div className="caption" style={{ color: '#66b7ff', marginBottom: 12 }}>Method 2</div>
                  <h2 className="h-3" style={{ margin: 0, marginBottom: 16 }}>Scan with your phone</h2>
                  <ol style={{ paddingLeft: 18, fontSize: 14, color: 'var(--text-2)', lineHeight: 1.7, marginBottom: 24 }}>
                    <li><b>iOS:</b> Settings → Cellular → Add eSIM → Use QR Code</li>
                    <li><b>Android:</b> Settings → Network → SIMs → + Add eSIM</li>
                    <li>Point camera at the QR on the right</li>
                  </ol>
                  <button className="btn btn-ghost" style={{ height: 48 }}>Email QR again</button>
                </div>
                <div style={{ display: 'flex', justifyContent: 'center' }}>
                  <div style={{
                    background: '#fff', padding: 24, borderRadius: 24,
                    boxShadow: '0 30px 80px rgba(0,127,255,0.3)'
                  }}>
                    <div style={{
                      width: 240, height: 240,
                      display: 'grid', gridTemplateColumns: 'repeat(21, 1fr)',
                      gap: 0
                    }}>
                      {qrCells.map((on, i) => {
                        const r = Math.floor(i / 21), c = i % 21;
                        // anchor squares
                        const inAnchor = (rr,cc) => (rr<7&&cc<7) || (rr<7&&cc>13) || (rr>13&&cc<7);
                        if (inAnchor(r,c)) {
                          const ar = r%7, ac = (c%7+7)%7 < 7 ? c%7 : c%7;
                          const cc = c < 7 ? c : c - 14;
                          const black = (ar===0||ar===6||cc===0||cc===6) || (ar>=2&&ar<=4&&cc>=2&&cc<=4);
                          return <span key={i} style={{ background: black?'#000':'#fff' }} />;
                        }
                        return <span key={i} style={{ background: on ? '#000' : '#fff' }} />;
                      })}
                    </div>
                    <div style={{ textAlign: 'center', marginTop: 12, fontSize: 11, color: '#666', fontFamily: 'monospace' }}>NEO-2026-04-A8F2D</div>
                  </div>
                </div>
              </div>
            )}

            {tab === 'manual' && (
              <div>
                <div className="caption" style={{ color: '#66b7ff', marginBottom: 12 }}>Method 3 · Advanced</div>
                <h2 className="h-3" style={{ margin: 0, marginBottom: 16 }}>Enter activation details manually</h2>
                <p className="body-sm" style={{ marginBottom: 28, maxWidth: 540 }}>
                  Use this when QR scanning isn't possible (e.g., installing on the same device that received the email).
                </p>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12, maxWidth: 580 }}>
                  {[
                    { l: 'SM-DP+ Address', v: 'rsp.neosim.com' },
                    { l: 'Activation Code', v: 'NEO-2026-04-A8F2D-9KX7P-MPC4R' },
                    { l: 'Confirmation Code (optional)', v: '— not required —' },
                  ].map((r, i) => (
                    <div key={i} style={{
                      padding: '16px 20px', borderRadius: 14,
                      background: 'rgba(255,255,255,0.02)', border: '1px solid var(--border)',
                      display: 'flex', alignItems: 'center', gap: 16
                    }}>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 11, color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>{r.l}</div>
                        <div className="mono" style={{ color: '#fff', fontSize: 14, marginTop: 4 }}>{r.v}</div>
                      </div>
                      <button className="btn-icon" style={{ width: 40, height: 40 }}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* next steps */}
          <div style={{ marginTop: 56 }}>
            <h2 className="h-3" style={{ margin: 0, marginBottom: 24 }}>Two more things</h2>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }} className="next-grid">
              <a href="topup.html" className="glass card-hover" style={{ padding: 28, display: 'flex', gap: 18, alignItems: 'center', color: '#fff', textDecoration: 'none' }}>
                <span className="icon-chip"><I.Wallet size={22} /></span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, fontSize: 17 }}>Top up your wallet</div>
                  <div style={{ fontSize: 13, color: 'var(--text-2)', marginTop: 4 }}>From $5 · Apple/Google Pay · 3% Miles back</div>
                </div>
                <I.ArrowRight size={18} />
              </a>
              <a href="#" className="glass card-hover" style={{ padding: 28, display: 'flex', gap: 18, alignItems: 'center', color: '#fff', textDecoration: 'none' }}>
                <span className="icon-chip"><I.Apple size={22} /></span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, fontSize: 17 }}>Get the wallet app</div>
                  <div style={{ fontSize: 13, color: 'var(--text-2)', marginTop: 4 }}>Live usage, top-ups, support — iOS &amp; Android</div>
                </div>
                <I.ArrowRight size={18} />
              </a>
            </div>
          </div>
        </div>
      </section>
      <Footer />
      <style>{`
        @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
        @media (max-width: 720px) {
          .install-grid { grid-template-columns: 1fr !important; }
          .next-grid { grid-template-columns: 1fr !important; }
        }
      `}</style>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<SuccessPage />);
</script>
</body>
</html>
