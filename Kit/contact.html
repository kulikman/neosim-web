<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contact — NeoSIM</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="parts/Shared.jsx"></script>
<script type="text/babel" src="parts/Nav.jsx"></script>
<script type="text/babel" src="parts/Footer.jsx"></script>
<script type="text/babel" src="parts/SimplePage.jsx"></script>
<script type="text/babel">
function Contact() {
  const channels = [
    { i: <I.Mail size={22} />, t: 'Live chat', d: 'In-app, 24/7. Average reply under 2 minutes.', cta: 'Open chat' },
    { i: <I.Globe size={22} />, t: 'Email support', d: 'help@neosim.com — replies within 4 hours.', cta: 'Send email' },
    { i: <I.Building size={22} />, t: 'Press & partnerships', d: 'press@neosim.com · partners@neosim.com', cta: 'Get in touch' },
  ];
  return (
    <SimplePage
      currentPath="contact"
      caption="Contact"
      title={<>We <span className="gradient-text">reply</span>. Quickly.</>}
      subtitle="Three ways to reach humans who actually know how the network works."
      narrow
    >
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14, marginBottom: 60 }}>
        {channels.map(c => (
          <div key={c.t} className="glass card-hover" style={{ padding: 28, display: 'flex', gap: 20, alignItems: 'center' }}>
            <span className="icon-chip">{c.i}</span>
            <div style={{ flex: 1 }}>
              <h3 className="h-4" style={{ margin: 0, marginBottom: 4 }}>{c.t}</h3>
              <p className="body-sm" style={{ margin: 0, color: 'var(--text-2)' }}>{c.d}</p>
            </div>
            <button className="btn btn-ghost" style={{ height: 44 }}>{c.cta} <I.ArrowRight size={14} /></button>
          </div>
        ))}
      </div>

      <div className="glass-strong" style={{ padding: 36 }}>
        <h3 className="h-4" style={{ margin: 0, marginBottom: 24 }}>Send a message</h3>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 12 }}>
          <div className="field"><I.User size={16} /><input placeholder="Your name" /></div>
          <div className="field">@<input placeholder="your@email.com" /></div>
        </div>
        <div className="field" style={{ marginBottom: 12 }}><input placeholder="Subject" /></div>
        <textarea placeholder="What can we help with?" style={{
          width: '100%', minHeight: 140, padding: 16, borderRadius: 14,
          background: 'rgba(255,255,255,0.04)', border: '1px solid var(--border)',
          color: '#fff', fontSize: 14, fontFamily: 'inherit', resize: 'vertical', marginBottom: 16
        }}/>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12 }}>
          <span style={{ fontSize: 12, color: 'var(--text-3)' }}>Tallinn HQ · Frankfurt · Singapore · São Paulo</span>
          <button className="btn btn-primary" style={{ height: 48 }}>Send message <I.ArrowRight size={14} /></button>
        </div>
      </div>
    </SimplePage>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Contact />);
</script>
</body>
</html>
