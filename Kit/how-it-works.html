<script type="text/babel">

];

        <div style={{ position: 'absolute', left: 0, right: 0, bottom: 0, height: 180, background: 'linear-gradient(180deg, transparent, var(--bg-deep))', zIndex: 2 }} />

          <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 32, flexWrap: 'wrap' }}>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>

                  cursor: 'pointer', transition: 'all 0.25s ease', width: '100%',

                onMouseEnter={e => { if (active !== i) e.currentTarget.style.background = 'rgba(255,255,255,0.03)'; }}

                    fontSize: 13, fontWeight: 700, letterSpacing: '0.05em',

                        background: 'linear-gradient(135deg, #007fff, rgba(0,127,255,0.3))',
                        WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',

                      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 32 }}>

                          <span key={j} style={{ padding: '6px 14px', borderRadius: 999, fontSize: 12, fontWeight: 600, background: 'rgba(0,127,255,0.1)', border: '1px solid rgba(0,127,255,0.25)', color: '#9bc9ff' }}>{tag}</span>

                      <div style={{ display: 'flex', gap: 6 }}>

                      </div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
        <style>{`
          @keyframes stepFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        </div>

        <div className="container" style={{ position: 'relative' }}>
          <div className="glass-strong" style={{
            padding: '64px 56px', position: 'relative', overflow: 'hidden',
            background: 'linear-gradient(135deg, rgba(0,127,255,0.18), rgba(0,127,255,0.04))',
            border: '1px solid rgba(0,127,255,0.3)', textAlign: 'center'

            <div style={{ position: 'absolute', left: '50%', top: -120, transform: 'translateX(-50%)', width: 480, height: 480, borderRadius: '50%',

              <h2 className="h-1" style={{ margin: '0 0 16px' }}>Ready in less time<br/><span className="gradient-text">than your coffee order.</span></h2>
              <p className="lead" style={{ marginBottom: 36, maxWidth: 480, margin: '0 auto 36px' }}>

              <div style={{ display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap' }}>
                <a href="get-esim.html" className="btn btn-primary" style={{ height: 56, padding: '0 32px', fontSize: 16 }}>
                  Get my free eSIM <I.ArrowRight size={18}/>
                </a>
                <a href="coverage.html" className="btn btn-ghost" style={{ height: 56, padding: '0 28px', fontSize: 16 }}>
                  Browse coverage
                </a>
              </div>
            </div>
          </div>
        </div>
      </section>

      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<HowItWorksPage />);
</script>
